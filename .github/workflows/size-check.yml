name: Package Size Check

on:
  pull_request:
    branches: [ main ]

jobs:
  size:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    
    - name: Check package size
      run: |
        npm pack --dry-run
        SIZE=$(npm pack --dry-run 2>&1 | grep "package size" | awk '{print $3}')
        echo "Package size: $SIZE"
        
        # Warn if package is larger than 100KB
        if [ "${SIZE%kB}" -gt 100 ]; then
          echo "⚠️ Warning: Package size exceeds 100KB"
        fi
